<!-- @dsCard group="Components" viewport="700x320" name="Feedback — Badges, Tags, Progress" subtitle="Badge, Tag, ProgressBar, ProgressRing" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--surface-page); padding: 22px; color: var(--text-primary); }
  .group { display: flex; flex-wrap: wrap; align-items: center; gap: 10px; margin-bottom: 18px; }
  .rings { display: flex; gap: 26px; align-items: center; }
  .bars { display: flex; flex-direction: column; gap: 14px; max-width: 320px; }
  .split { display: flex; gap: 40px; align-items: center; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { Badge, Tag, ProgressBar, ProgressRing } = window.JiadHilalDesignSystem_e787fe;
  function Demo() {
    const [active, setActive] = React.useState('Chest');
    return (
      <div>
        <div className="group">
          <Badge tone="green" variant="solid" dot>Live</Badge>
          <Badge tone="purple">Strength</Badge>
          <Badge tone="red" variant="solid">Max effort</Badge>
          <Badge tone="neutral">Rest day</Badge>
          <Badge tone="dark">Week 4</Badge>
          <Badge tone="green">New PR</Badge>
        </div>
        <div className="group">
          {['Chest','Back','Legs','Shoulders','Core'].map(m =>
            <Tag key={m} active={active===m} onClick={()=>setActive(m)}>{m}</Tag>
          )}
        </div>
        <div className="split">
          <div className="bars">
            <ProgressBar value={68} label="Week 4 of 8" showValue />
            <ProgressBar value={90} tone="green" label="Daily protein" showValue />
            <ProgressBar value={35} tone="red" label="Recovery" showValue />
          </div>
          <div className="rings">
            <ProgressRing value={75} sublabel="Today" />
            <ProgressRing value={100} tone="green" label="Done" size={80} />
          </div>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body>
</html>
