<!-- @dsCard group="Spacing" viewport="700x180" name="Elevation & Glow" subtitle="Neutral shadows + purple brand glow" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--gray-100); padding: 24px; display: flex; align-items: center; gap: 22px; height: 180px; box-sizing: border-box; }
  .c { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .box { width: 96px; height: 70px; background: var(--surface-card); border-radius: var(--radius-md); }
  .brand { background: var(--purple-500); }
  .t { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="c"><div class="box" style="box-shadow:var(--shadow-sm)"></div><span class="t">sm</span></div>
  <div class="c"><div class="box" style="box-shadow:var(--shadow-md)"></div><span class="t">md</span></div>
  <div class="c"><div class="box" style="box-shadow:var(--shadow-lg)"></div><span class="t">lg</span></div>
  <div class="c"><div class="box" style="box-shadow:var(--shadow-xl)"></div><span class="t">xl</span></div>
  <div class="c"><div class="box brand" style="box-shadow:var(--shadow-brand)"></div><span class="t">brand</span></div>
</body>
</html>
