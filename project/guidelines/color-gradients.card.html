<!-- @dsCard group="Colors" viewport="700x170" name="Signature Gradients" subtitle="Brand purple ramps + energy blend" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--surface-card); padding: 16px; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
  .sw { height: 138px; border-radius: var(--radius-lg); display: flex; align-items: flex-end; padding: 12px; box-sizing: border-box; color: #fff; }
  .name { font-size: 11px; font-weight: 800; letter-spacing: .02em; }
</style>
</head>
<body>
  <div class="grid">
    <div class="sw" style="background:var(--grad-brand)"><span class="name">grad-brand</span></div>
    <div class="sw" style="background:var(--grad-brand-vivid)"><span class="name">brand-vivid</span></div>
    <div class="sw" style="background:var(--grad-energy)"><span class="name">grad-energy</span></div>
    <div class="sw" style="background:var(--grad-ink)"><span class="name">grad-ink</span></div>
  </div>
</body>
</html>
