<!-- @dsCard group="Brand" viewport="700x220" name="Primary Logo Lockup" subtitle="Purple wordmark + mark on transparent" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body {
    margin: 0; font-family: var(--font-sans); height: 220px;
    display: flex; align-items: center; justify-content: center;
    /* checkerboard = transparency */
    background-color: var(--white);
    background-image:
      linear-gradient(45deg, var(--gray-100) 25%, transparent 25%),
      linear-gradient(-45deg, var(--gray-100) 25%, transparent 25%),
      linear-gradient(45deg, transparent 75%, var(--gray-100) 75%),
      linear-gradient(-45deg, transparent 75%, var(--gray-100) 75%);
    background-size: 22px 22px;
    background-position: 0 0, 0 11px, 11px -11px, -11px 0;
  }
  img { width: 64%; max-width: 470px; height: auto; }
</style>
</head>
<body>
  <img src="../assets/logo-lockup-purple.png" alt="Jiad Hilal — Personal Trainer & Athlete" />
</body>
</html>
