<!-- @dsCard group="Colors" viewport="700x150" name="Neon Purple — Brand Core" subtitle="#6200ff primary, with tints & shades" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--surface-card); }
  .row { display: flex; height: 150px; }
  .sw { flex: 1; display: flex; flex-direction: column; justify-content: flex-end; padding: 10px; box-sizing: border-box; }
  .sw .name { font-size: 11px; font-weight: 700; letter-spacing: .02em; }
  .sw .hex { font-family: var(--font-mono); font-size: 10px; opacity: .8; }
  .lt { color: #fff; } .dk { color: var(--char-black); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw dk" style="background:var(--purple-50)"><span class="name">50</span><span class="hex">#f5f1ff</span></div>
    <div class="sw dk" style="background:var(--purple-100)"><span class="name">100</span><span class="hex">#e9e0ff</span></div>
    <div class="sw dk" style="background:var(--purple-200)"><span class="name">200</span><span class="hex">#d2bcff</span></div>
    <div class="sw dk" style="background:var(--purple-300)"><span class="name">300</span><span class="hex">#b18cff</span></div>
    <div class="sw lt" style="background:var(--purple-400)"><span class="name">400</span><span class="hex">#8a4dff</span></div>
    <div class="sw lt" style="background:var(--purple-500)"><span class="name">500 · core</span><span class="hex">#6200ff</span></div>
    <div class="sw lt" style="background:var(--purple-600)"><span class="name">600</span><span class="hex">#5400d8</span></div>
    <div class="sw lt" style="background:var(--purple-700)"><span class="name">700</span><span class="hex">#4400b0</span></div>
    <div class="sw lt" style="background:var(--purple-800)"><span class="name">800</span><span class="hex">#320084</span></div>
    <div class="sw lt" style="background:var(--purple-900)"><span class="name">900</span><span class="hex">#21005a</span></div>
  </div>
</body>
</html>
