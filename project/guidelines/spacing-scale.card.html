<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing Scale" subtitle="4px base grid, space-1 → space-16" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--surface-card); padding: 20px 24px; display: flex; align-items: flex-end; gap: 14px; height: 150px; box-sizing: border-box; }
  .c { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .bar { width: 100%; background: var(--grad-brand); border-radius: 4px 4px 0 0; }
  .t { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="c"><div class="bar" style="height:4px"></div><span class="t">1·4</span></div>
  <div class="c"><div class="bar" style="height:8px"></div><span class="t">2·8</span></div>
  <div class="c"><div class="bar" style="height:12px"></div><span class="t">3·12</span></div>
  <div class="c"><div class="bar" style="height:16px"></div><span class="t">4·16</span></div>
  <div class="c"><div class="bar" style="height:24px"></div><span class="t">6·24</span></div>
  <div class="c"><div class="bar" style="height:32px"></div><span class="t">8·32</span></div>
  <div class="c"><div class="bar" style="height:48px"></div><span class="t">12·48</span></div>
  <div class="c"><div class="bar" style="height:64px"></div><span class="t">16·64</span></div>
</body>
</html>
