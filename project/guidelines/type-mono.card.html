<!-- @dsCard group="Type" viewport="700x160" name="Mono — JetBrains" subtitle="Reps, loads, timers, tabular data" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-mono); background: var(--char-black); color: #fff; padding: 18px 24px; display: flex; align-items: center; gap: 36px; height: 160px; box-sizing: border-box; }
  .stat { display: flex; flex-direction: column; gap: 4px; }
  .num { font-size: 44px; font-weight: 700; letter-spacing: -.02em; }
  .num .u { font-size: 18px; color: var(--purple-300); }
  .lbl { font-family: var(--font-sans); font-size: 11px; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; color: var(--gray-400); }
  .g { color: var(--green-neon); }
</style>
</head>
<body>
  <div class="stat"><span class="num">185<span class="u">lb</span></span><span class="lbl">Top set</span></div>
  <div class="stat"><span class="num">12<span class="u">×</span></span><span class="lbl">Reps</span></div>
  <div class="stat"><span class="num">04:32</span><span class="lbl">Rest timer</span></div>
  <div class="stat"><span class="num g">+8%</span><span class="lbl">vs last week</span></div>
</body>
</html>
