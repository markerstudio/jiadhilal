<!-- @dsCard group="Type" viewport="700x160" name="Expressive Accent — Archivo Italic" subtitle="Black italic lowercase; expressive 'signature' moments" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--grad-brand); color: #fff; padding: 16px 24px; display: flex; flex-direction: column; justify-content: center; height: 160px; box-sizing: border-box; }
  .accent { font-family: var(--font-accent); font-style: italic; font-weight: 900; font-size: 40px; line-height: 1; letter-spacing: -0.02em; text-transform: lowercase; }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--purple-100); margin-top: 14px; }
</style>
</head>
<body>
  <div class="accent">stronger every day</div>
  <div class="meta">Archivo · 900 italic · lowercase · expressive accents only</div>
</body>
</html>
