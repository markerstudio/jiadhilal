<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--surface-card); color: var(--text-primary); padding: 18px 24px; }
  .r { display: flex; align-items: baseline; gap: 16px; padding: 5px 0; border-bottom: 1px solid var(--border-subtle); }
  .r:last-child { border: 0; }
  .l { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); width: 64px; flex: none; }
  .s { font-weight: 800; line-height: 1.05; letter-spacing: -.02em; }
</style>
</head>
<body>
  <div class="r"><span class="l">h1 · 56</span><span class="s" style="font-size:42px">Build the engine</span></div>
  <div class="r"><span class="l">h2 · 40</span><span class="s" style="font-size:30px">Train with purpose</span></div>
  <div class="r"><span class="l">h3 · 28</span><span class="s" style="font-size:22px">Weekly progression</span></div>
  <div class="r"><span class="l">lg · 18</span><span class="s" style="font-size:18px;font-weight:600">Intro paragraph lead</span></div>
  <div class="r"><span class="l">body · 16</span><span class="s" style="font-size:16px;font-weight:400">Standard body copy</span></div>
  <div class="r"><span class="l">overline</span><span class="s" style="font-size:11px;font-weight:800;letter-spacing:.18em;text-transform:uppercase;color:var(--purple-500)">Personal Trainer &amp; Athlete</span></div>
</body>
</html>
