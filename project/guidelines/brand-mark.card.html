<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-sans); display: grid; grid-template-columns: repeat(3,1fr); height: 190px; }
  .cell { display: flex; align-items: center; justify-content: center; }
  .cell img { width: 88px; height: auto; }
  .purple { background: var(--grad-brand); }
  .light { background: var(--white); }
  .dark { background: var(--char-black); }
</style>
</head>
<body>
  <div class="cell purple"><img src="../assets/logo-mark-white.png" alt="mark white" /></div>
  <div class="cell light"><img src="../assets/logo-mark-purple.png" alt="mark purple" /></div>
  <div class="cell dark"><img src="../assets/logo-mark-white.png" alt="mark white on black" /></div>
</body>
</html>
