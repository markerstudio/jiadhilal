<!-- @dsCard group="Colors" viewport="700x160" name="Neutrals — Char-Black ramp" subtitle="Char-Black #232323 + warm-cool grays" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--surface-card); }
  .row { display: flex; height: 160px; }
  .sw { flex: 1; display: flex; flex-direction: column; justify-content: flex-end; padding: 9px; box-sizing: border-box; }
  .name { font-size: 10.5px; font-weight: 700; }
  .hex { font-family: var(--font-mono); font-size: 9.5px; opacity: .85; }
  .lt { color: #fff; } .dk { color: var(--char-black); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw lt" style="background:var(--ink-950)"><span class="name">ink-950</span><span class="hex">#141118</span></div>
    <div class="sw lt" style="background:var(--char-black)"><span class="name">char-black</span><span class="hex">#232323</span></div>
    <div class="sw lt" style="background:var(--ink-800)"><span class="name">ink-800</span><span class="hex">#2a2633</span></div>
    <div class="sw lt" style="background:var(--gray-600)"><span class="name">600</span><span class="hex">#5b5766</span></div>
    <div class="sw lt" style="background:var(--gray-500)"><span class="name">500</span><span class="hex">#7b7788</span></div>
    <div class="sw dk" style="background:var(--gray-400)"><span class="name">400</span><span class="hex">#a3a0ad</span></div>
    <div class="sw dk" style="background:var(--gray-300)"><span class="name">300</span><span class="hex">#cac8d2</span></div>
    <div class="sw dk" style="background:var(--gray-200)"><span class="name">200</span><span class="hex">#e7e5ec</span></div>
    <div class="sw dk" style="background:var(--gray-100)"><span class="name">100</span><span class="hex">#f3f2f7</span></div>
    <div class="sw dk" style="background:var(--gray-50);border-right:1px solid var(--gray-200)"><span class="name">50</span><span class="hex">#faf9fc</span></div>
  </div>
</body>
</html>
